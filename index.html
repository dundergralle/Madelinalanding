.bg::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(253,238,233,0.6) 0%,
    rgba(253,238,233,0.3) 40%,
    rgba(253,238,233,0.75) 100%);
}

/* TOP LINE */
.top-line {
  position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 20;
  background: linear-gradient(90deg, var(--pink3), var(--pink), var(--pink2), var(--mint), var(--pink), var(--pink3));
  background-size: 200% 100%;
  animation: line-slide 4s linear infinite;
}
@keyframes line-slide { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

/* FLOATING KAWAII */
.floaties { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.floatie {
  position: absolute; bottom: -40px;
  animation: float-up linear infinite;
  opacity: 0; font-size: 20px;
}
@keyframes float-up {
  0%   { transform: translateY(0) rotate(-10deg) scale(0.6); opacity: 0; }
  10%  { opacity: 0.9; }
  90%  { opacity: 0.5; }
  100% { transform: translateY(-110vh) rotate(15deg) scale(1.1); opacity: 0; }
}

/* CONTENT */
.content {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh;
  padding: max(2.5rem, env(safe-area-inset-top)) 1.5rem max(2.5rem, env(safe-area-inset-bottom));
}

/* AVATAR */
.av-wrap { position: relative; width: 118px; height: 118px; margin-bottom: 1rem; }
.av-ring {
  position: absolute; inset: -5px; border-radius: 50%;
  background: conic-gradient(var(--pink), var(--pink2), var(--mint), var(--pink2), var(--pink));
  animation: spin 6s linear infinite;
  box-shadow: 0 0 16px rgba(242,167,184,0.6);
}
@keyframes spin { to { transform: rotate(360deg); } }
.av-inner {
  position: absolute; inset: 3px; border-radius: 50%;
  background: var(--cream); z-index: 1;
}
.av-img {
  position: absolute; inset: 5px; z-index: 2;
  width: calc(100% - 10px); height: calc(100% - 10px);
  border-radius: 50%; object-fit: cover; display: block;
}
.av-placeholder {
  position: absolute; inset: 5px; z-index: 2;
  border-radius: 50%;
  background: linear-gradient(135deg, #fde8ec, #f7c5d0);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
}
.badge {
  position: absolute; bottom: -6px; right: -6px; z-index: 3;
  font-size: 22px;
  animation: badge-bounce 2s ease-in-out infinite;
  filter: drop-shadow(0 2px 4px rgba(242,167,184,0.5));
}
@keyframes badge-bounce {
  0%,100% { transform: rotate(-15deg) scale(1) translateY(0); }
  50%      { transform: rotate(10deg) scale(1.2) translateY(-3px); }
}

/* NAME */
h1 {
  font-family: 'Pacifico', cursive;
  font-size: 2.6rem;
  font-weight: 400;
  color: var(--accent);
  text-align: center;
  margin-bottom: 0.2rem;
  letter-spacing: 0.02em;
  text-shadow: 0 3px 0 rgba(232,132,154,0.25), 0 0 20px rgba(242,167,184,0.3);
}

/* TAGLINE */
.tagline {
  font-size: 0.88rem; font-weight: 600;
  color: var(--brown);
  text-align: center; margin-bottom: 0.7rem;
  letter-spacing: 0.03em;
}

/* DECO DOTS */
.dots {
  display: flex; gap: 6px; margin-bottom: 1rem; align-items: center;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--pink2);
  animation: dot-bounce 1.4s ease-in-out infinite;
}
.dot:nth-child(2){ animation-delay:0.15s; background: var(--pink); }
.dot:nth-child(3){ animation-delay:0.3s; background: var(--mint); }
.dot:nth-child(4){ animation-delay:0.45s; background: var(--pink); }
.dot:nth-child(5){ animation-delay:0.6s; background: var(--pink2); }
@keyframes dot-bounce {
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-5px); }
}

/* LOCATION */
.loc {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--brown); opacity: 0.8;
  margin-bottom: 1.4rem; font-weight: 600;
  background: rgba(255,255,255,0.5);
  padding: 5px 14px; border-radius: 50px;
  border: 1.5px solid rgba(242,167,184,0.4);
  backdrop-filter: blur(8px);
}
.loc-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #6dbf7e;
  box-shadow: 0 0 6px #6dbf7e;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* BUTTONS */
.btns {
  display: flex; flex-direction: column; gap: 0.7rem;
  width: 100%; max-width: 300px;
}

.btn {
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; min-height: 54px; padding: 0 1.5rem;
  border-radius: 999px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 2px solid rgba(242,167,184,0.5);
  color: var(--accent);
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem; font-weight: 800;
  letter-spacing: 0.04em;
  text-decoration: none; text-align: center;
  cursor: pointer; touch-action: manipulation;
  user-select: none; -webkit-user-select: none;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 0 rgba(242,167,184,0.4), 0 6px 16px rgba(242,167,184,0.15);
}

.btn-primary {
  background: linear-gradient(135deg, #f7c5d0 0%, #f2a7b8 100%);
  border-color: var(--accent);
  color: #fff;
  text-shadow: 0 1px 3px rgba(200,80,100,0.3);
  box-shadow: 0 4px 0 #e8849a, 0 6px 20px rgba(242,167,184,0.4);
  animation: btn-wiggle 3s ease-in-out infinite;
}
@keyframes btn-wiggle {
  0%,100%{ transform:translateY(0); box-shadow: 0 4px 0 #e8849a, 0 6px 20px rgba(242,167,184,0.4); }
  50%    { transform:translateY(-3px); box-shadow: 0 7px 0 #e8849a, 0 10px 24px rgba(242,167,184,0.5); }
}

.btn-secondary {
  background: rgba(255,255,255,0.85);
  border-color: rgba(181,221,208,0.7);
  color: var(--brown);
  box-shadow: 0 4px 0 rgba(181,221,208,0.5), 0 6px 16px rgba(181,221,208,0.2);
}

.btn:active { transform: scale(0.97) translateY(2px) !important; }
@media (hover:hover) {
  .btn:hover { transform: translateY(-2px); }
}

/* SHIMMER */
.btn::after {
  content: ''; position: absolute;
  top:0; left:-100%; width:50%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer { 0%,60%{left:-100%;} 100%{left:140%;} }

/* FOOTER */
.footer {
  margin-top: 1.6rem;
  font-size: 0.78rem; font-weight: 700;
  color: var(--pink);
  letter-spacing: 0.08em;
}

@media (max-width: 430px) {
  h1 { font-size: 2.1rem; }
  .av-wrap { width: 100px; height: 100px; }
  .btns { max-width: 100%; }
  .btn { min-height: 52px; font-size: 0.85rem; }
}
@media (max-height: 650px) {
  .av-wrap { width: 85px; height: 85px; margin-bottom: 0.6rem; }
  h1 { font-size: 1.9rem; }
  .loc { margin-bottom: 1rem; }
  .btns { gap: 0.45rem; }
  .btn { min-height: 48px; }
  .footer { margin-top: 1rem; }
}
</style>
</head>
<body>

<div class="top-line"></div>
<div class="bg"></div>

<div class="floaties" id="floaties"></div>

<div class="content">
  <div class="av-wrap">
    <div class="av-ring"></div>
    <div class="av-inner"></div>
    <div class="av-placeholder">🐰</div>
    <!-- Byt ut av-placeholder mot: <img class="av-img" src="DIN-BILD-URL-HÄR" alt="Madelina"> -->
    <span class="badge">🍓</span>
  </div>

  <h1>Madelina</h1>
  <p class="tagline">din favorit e-tjej ✨</p>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="loc">
    <span class="loc-dot"></span>
    <span id="loc-text">loading...</span>
  </div>

  <div class="btns">
    <a class="btn btn-primary" href="/link">
      🍡 mera än bara skriva
    </a>
    <a class="btn btn-secondary" href="/link2">
      🎀 för snålisarna
    </a>
    <a class="btn" href="https://www.instagram.com/Madelina_2008" target="_blank">
      🌸 instagram
    </a>
  </div>

  <p class="footer">🌸 kawaii & kaotisk 🌸</p>
</div>

<script>
// FLOATING KAWAII ITEMS
(function(){
  var container = document.getElementById('floaties');
  var items = ['🌸','🍓','🎀','🐰','🌸','💗','🍡','🌸','🐾','🌷','🌸','🍰','🎀','🌸','💮','🍑','🌸'];
  function spawn(){
    var el = document.createElement('span');
    el.className = 'floatie';
    el.textContent = items[Math.floor(Math.random() * items.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (14 + Math.random() * 18) + 'px';
    var dur = 7 + Math.random() * 8;
    var delay = Math.random() * 3;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = delay + 's';
    container.appendChild(el);
    setTimeout(function(){ el.remove(); }, (dur + delay) * 1000);
  }
  setInterval(spawn, 400);
})();

// LOCATION
(function(){
  var f=['Tokyo','Seoul','Osaka','Harajuku','Kyoto','Shibuya','Stockholm','Göteborg',
    'Malmö','Helsingborg','Copenhagen','Amsterdam','Paris','Bali','Tulum','Singapore'];
  function setCity(c){ document.getElementById('loc-text').textContent = '5 minutes ago in: ' + (c && c.trim().length > 1 ? c.trim() : f[Math.floor(Math.random() * f.length)]); }
  function get(u,e){ return fetch(u,{cache:'no-store'}).then(r=>r.json()).then(d=>{var v=e(d);if(!v||v.trim().length<2)throw 0;return v;}); }
  get('https://ipinfo.io/json',d=>d&&d.city)
    .catch(()=>get('https://ip-api.com/json/?fields=city,regionName',d=>d&&(d.city||d.regionName)))
    .catch(()=>get('https://ipapi.co/json/',d=>d&&(d.city||d.region)))
    .then(setCity).catch(()=>setCity(null));
})();
</script>
</body>
</html>
